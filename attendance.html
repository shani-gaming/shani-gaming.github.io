<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance — Les Sages de Pandarie</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/common.css">

    <!-- Firebase compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { padding-top: 70px; background: var(--bg-deep); }

        /* ── Page Header ── */
        .page-header {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            padding: 2.5rem 0 2rem;
        }
        .page-header-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .page-label {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--primary);
            border: 1px solid var(--primary);
            border-radius: 4px;
            padding: 0.15rem 0.6rem;
            margin-bottom: 0.6rem;
        }
        .page-header h1 { font-size: 2.4rem; margin-bottom: 0.3rem; }
        .page-header p  { color: var(--text-muted); font-size: 0.92rem; }

        /* ── Admin button ── */
        .admin-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-muted);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            text-decoration: none;
        }
        .admin-btn:hover { border-color: var(--primary); color: var(--primary); }
        .admin-btn.connected { border-color: var(--accent); color: var(--accent); }

        .admin-bar {
            display: none;
            align-items: center;
            gap: 0.75rem;
            margin-top: 0.75rem;
            padding: 0.6rem 1rem;
            background: rgba(51,255,170,0.06);
            border: 1px solid rgba(51,255,170,0.2);
            border-radius: 8px;
            font-size: 0.82rem;
            color: var(--accent);
        }
        .admin-bar a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
        }
        .admin-bar a:hover { text-decoration: underline; }

        /* ── Content ── */
        .content { padding: 2.5rem 0 5rem; }

        /* ── Event attendance card ── */
        .event-att-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 0.75rem;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .event-att-card:hover { border-color: rgba(238,187,85,0.3); }

        .event-att-header {
            display: grid;
            grid-template-columns: 80px 1fr auto;
            align-items: center;
            gap: 1.25rem;
            padding: 1rem 1.5rem;
            cursor: pointer;
            position: relative;
        }
        .event-att-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; bottom: 0;
            width: 3px;
            background: var(--primary);
            border-radius: 3px 0 0 3px;
        }

        .event-date-block {
            text-align: center;
            background: var(--bg-surface);
            border-radius: 8px;
            padding: 0.5rem 0.4rem;
            border: 1px solid var(--border);
        }
        .event-day-name  { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
        .event-day-num   { font-size: 1.6rem; font-weight: 800; line-height: 1; color: var(--primary); margin: 0.1rem 0; }
        .event-month-lbl { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; color: var(--text-muted); }

        .event-att-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.25rem; }
        .event-att-sub   { font-size: 0.78rem; color: var(--text-muted); }

        .event-att-stats {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.35rem;
        }
        .att-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.2rem 0.65rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            white-space: nowrap;
        }
        .att-badge.total    { background: var(--primary-dim); color: var(--primary); }
        .att-badge.tanks    { background: rgba(248,113,113,0.12); color: #f87171; }
        .att-badge.melee    { background: rgba(198,155,109,0.12); color: #C69B6D; }
        .att-badge.ranged   { background: rgba(63,199,235,0.12);  color: #3FC7EB; }
        .att-badge.healers  { background: rgba(51,255,170,0.12);  color: var(--accent); }
        .expand-icon { font-size: 0.75rem; color: var(--text-muted); margin-left: 0.5rem; transition: transform 0.2s; }
        .event-att-card.open .expand-icon { transform: rotate(180deg); }

        /* ── Signup detail panel ── */
        .event-att-detail {
            display: none;
            padding: 0 1.5rem 1.25rem;
            border-top: 1px solid var(--border);
        }
        .event-att-card.open .event-att-detail { display: block; }

        .role-group { margin-top: 1rem; }
        .role-group-title {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        .player-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }
        .player-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.25rem 0.7rem;
            border-radius: 6px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            font-size: 0.78rem;
            font-weight: 600;
        }
        .class-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .player-spec { font-size: 0.68rem; color: var(--text-muted); font-weight: 400; }

        .absence-row {
            margin-top: 0.75rem;
            font-size: 0.75rem;
            color: #f87171;
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            align-items: center;
        }
        .absence-label { font-weight: 700; margin-right: 0.25rem; }

        /* ── Loading ── */
        .skeleton-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            height: 80px;
            margin-bottom: 0.75rem;
            animation: shimmer 1.4s ease infinite;
        }
        @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .empty-state { text-align: center; padding: 4rem; color: var(--text-muted); }

        @media (max-width: 640px) {
            .event-att-header { grid-template-columns: 60px 1fr; }
            .event-att-stats { display: none; }
        }
    </style>
</head>
<body>

    <nav class="navbar"></nav>
    <script src="scripts/navbar.js"></script>

    <div class="page-header">
        <div class="container">
            <div class="page-header-row">
                <div>
                    <div class="page-label">Raid-Helper</div>
                    <h1>Attendance</h1>
                    <p>Historique de présence aux événements · Les Sages de Pandarie</p>
                </div>
                <button class="admin-btn" id="adminBtn" onclick="toggleAdmin()">🔐 Admin</button>
            </div>
            <div class="admin-bar" id="adminBar">
                <span>✓ Connecté en tant qu'admin</span>
                <a href="admin-attendance.html">⚙ Gérer le mapping Discord ↔ WoW →</a>
            </div>
        </div>
    </div>

    <div class="content">
        <div class="container">
            <div id="att-container">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
        </div>
    </div>

    <script>
    // ── Firebase ──────────────────────────────────────────────────────────────
    const firebaseConfig = {
        apiKey: "AIzaSyD0cmazoD42kD_H243Do5pIPGhwXFgOHYE",
        authDomain: "guild-roster-67da7.firebaseapp.com",
        projectId: "guild-roster-67da7",
        storageBucket: "guild-roster-67da7.firebasestorage.app",
        messagingSenderId: "971948767326",
        appId: "1:971948767326:web:4377499f1ff23db1899ccf"
    };
    firebase.initializeApp(firebaseConfig);
    const db       = firebase.firestore();
    const auth     = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    let isAdmin    = false;
    let currentUser= null;

    const EVENTS_API  = 'https://europe-west1-guild-roster-67da7.cloudfunctions.net/getRaidHelperEvents';
    const DETAILS_API = 'https://europe-west1-guild-roster-67da7.cloudfunctions.net/getEventDetails';

    const DAYS_SHORT   = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
    const MONTHS_SHORT = ['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sep','Oct','Nov','Déc'];
    const CLASS_COLORS = {
        warrior:'#C69B6D', paladin:'#F48CBA', hunter:'#AAD372', rogue:'#FFF468',
        priest:'#FFFFFF',  shaman:'#0070DD',  mage:'#3FC7EB',   warlock:'#8788EE',
        monk:'#00FF98',    druid:'#FF7C0A',   evoker:'#33937F',
        dh:'#A330C9', 'demon hunter':'#A330C9',
        dk:'#C41E3A', 'death knight':'#C41E3A',
    };
    function classColor(c) {
        return CLASS_COLORS[(c||'').toLowerCase()] || '#888';
    }

    // ── Auth ──────────────────────────────────────────────────────────────────
    auth.onAuthStateChanged(async user => {
        currentUser = user;
        if (user) {
            const doc = await db.collection('admins').doc(user.email).get();
            isAdmin = doc.exists;
        } else {
            isAdmin = false;
        }
        updateAdminUI();
    });

    function updateAdminUI() {
        const btn = document.getElementById('adminBtn');
        const bar = document.getElementById('adminBar');
        if (currentUser && isAdmin) {
            btn.textContent = '✓ Admin';
            btn.classList.add('connected');
            bar.style.display = 'flex';
        } else if (currentUser && !isAdmin) {
            btn.textContent = 'Non autorisé';
            btn.classList.remove('connected');
            bar.style.display = 'none';
        } else {
            btn.textContent = '🔐 Admin';
            btn.classList.remove('connected');
            bar.style.display = 'none';
        }
    }

    async function toggleAdmin() {
        if (currentUser) {
            await auth.signOut();
        } else {
            try { await auth.signInWithPopup(provider); } catch(e) {}
        }
    }

    // ── Events ────────────────────────────────────────────────────────────────
    function extractTitle(e) {
        if (e.title && e.title !== 'unnamed') return e.title;
        const line = (e.description||'').split('\n')[0].trim();
        return line.replace(/^[\p{Emoji}\s\[\]]+/u,'').replace(/\s*[—–-]\s*.*/,'').trim() || 'Événement';
    }

    function fmtTime(ts) {
        const d = new Date(ts * 1000);
        return `${String(d.getHours()).padStart(2,'0')}h${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function renderEventCard(e) {
        const d     = new Date(e.startTime * 1000);
        const title = extractTitle(e);
        return `
            <div class="event-att-card" id="card-${e.id}">
                <div class="event-att-header" onclick="toggleCard('${e.id}')">
                    <div class="event-date-block">
                        <div class="event-day-name">${DAYS_SHORT[d.getDay()]}</div>
                        <div class="event-day-num">${d.getDate()}</div>
                        <div class="event-month-lbl">${MONTHS_SHORT[d.getMonth()]}</div>
                    </div>
                    <div>
                        <div class="event-att-title">${title}</div>
                        <div class="event-att-sub">${fmtTime(e.startTime)}${e.leader ? ' · RL : '+e.leader : ''}</div>
                    </div>
                    <div class="event-att-stats">
                        <span class="att-badge total">⚔ ${e.signUps} inscrits</span>
                        <span class="expand-icon">▼</span>
                    </div>
                </div>
                <div class="event-att-detail" id="detail-${e.id}">
                    <div style="color:var(--text-muted);font-size:0.82rem;padding:0.75rem 0;">Chargement…</div>
                </div>
            </div>`;
    }

    const loadedDetails = {};

    async function toggleCard(eventId) {
        const card   = document.getElementById(`card-${eventId}`);
        const detail = document.getElementById(`detail-${eventId}`);
        const isOpen = card.classList.contains('open');

        if (isOpen) {
            card.classList.remove('open');
            return;
        }

        card.classList.add('open');

        if (loadedDetails[eventId]) return;
        loadedDetails[eventId] = true;

        try {
            const res  = await fetch(`${DETAILS_API}?eventId=${eventId}`);
            const data = await res.json();
            detail.innerHTML = renderDetail(data);
        } catch(err) {
            detail.innerHTML = '<div style="color:var(--text-muted);font-size:0.82rem;padding:0.5rem 0;">Erreur de chargement.</div>';
        }
    }

    function renderDetail(d) {
        const signUps  = d.signUps || [];
        const absences = d.absences || [];
        const roles    = ['Tanks','Melee','Ranged','Healers'];
        const roleLabels = { Tanks:'🛡 Tanks', Melee:'⚔ Mêlée', Ranged:'🏹 Distance', Healers:'✚ Soins' };

        let html = '';
        roles.forEach(role => {
            const players = signUps.filter(p => p.role === role);
            if (!players.length) return;
            const chips = players.map(p => {
                const color = classColor(p.class);
                return `<span class="player-chip">
                    <span class="class-dot" style="background:${color}"></span>
                    <span style="color:${color}">${p.name}</span>
                    <span class="player-spec">${p.spec||''}</span>
                </span>`;
            }).join('');
            html += `<div class="role-group">
                <div class="role-group-title">${roleLabels[role]} (${players.length})</div>
                <div class="player-chips">${chips}</div>
            </div>`;
        });

        if (absences.length) {
            html += `<div class="absence-row">
                <span class="absence-label">Absences :</span>
                ${absences.map(p => `<span>${p.name}</span>`).join(', ')}
            </div>`;
        }

        return html || '<div style="color:var(--text-muted);font-size:0.82rem;padding:0.5rem 0;">Aucun inscrit.</div>';
    }

    async function loadAttendance() {
        const container = document.getElementById('att-container');
        try {
            const res = await fetch(`${EVENTS_API}?past=true`);
            const { events } = await res.json();

            if (!events.length) {
                container.innerHTML = '<div class="empty-state">Aucun événement passé trouvé.</div>';
                return;
            }

            container.innerHTML = events.map(renderEventCard).join('');
        } catch(err) {
            container.innerHTML = '<div class="empty-state">Erreur de chargement.</div>';
        }
    }

    loadAttendance();
    </script>

</body>
</html>
