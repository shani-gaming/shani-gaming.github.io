<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WarcraftLogs — Les Sages de Pandarie</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="stylesheet" href="styles/common.css">

    <style>
        body { padding-top: 80px; background: var(--bg-deep); }

        .page-header {
            padding: 4rem 0 2.5rem;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
        }
        .page-header h1 { font-size: 3rem; margin-bottom: 0.5rem; }
        .page-header p { color: var(--text-muted); font-size: 1.1rem; }

        .tier-label {
            display: inline-block;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--primary);
            border: 1px solid var(--primary);
            border-radius: 4px;
            padding: 0.15rem 0.6rem;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
        }

        .content-section { padding: 2.5rem 0 4rem; }

        /* ── Loading ── */
        .load-progress {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .load-bar-wrap {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
        }
        .load-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* ── Error / Empty ── */
        .status-box {
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
            padding: 5rem 2rem;
            color: var(--text-muted);
            text-align: center;
        }
        .status-box.visible { display: flex; }
        .status-box-icon { font-size: 3rem; opacity: 0.3; }
        .status-box h3 { font-size: 1.2rem; color: var(--text-main); margin: 0; }
        .status-box p { font-size: 0.9rem; max-width: 400px; line-height: 1.6; margin: 0; }

        /* ── Reports grid ── */
        .reports-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.25rem;
        }

        .report-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.4rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: border-color 0.2s, transform 0.15s;
        }
        .report-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .report-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .report-date {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--primary);
        }
        .report-duration {
            font-size: 0.78rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .report-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.3;
        }
        .report-owner {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.15rem;
        }

        .kill-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }
        .kill-tag {
            font-size: 0.72rem;
            font-weight: 600;
            padding: 0.2rem 0.55rem;
            border-radius: 4px;
            background: rgba(255,209,0,0.08);
            border: 1px solid rgba(255,209,0,0.2);
            color: #ffd100;
        }
        .kill-tag.heroic {
            background: rgba(0,163,255,0.08);
            border-color: rgba(0,163,255,0.2);
            color: #00a3ff;
        }
        .kill-tag.mythic {
            background: rgba(163,53,238,0.1);
            border-color: rgba(163,53,238,0.25);
            color: #a335ee;
        }
        .no-kills {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .report-footer {
            margin-top: auto;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border);
        }
        .report-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--primary);
            text-decoration: none;
            transition: color 0.15s;
        }
        .report-link:hover { color: #fff; }
        .report-link svg { flex-shrink: 0; }

        .kill-count-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 0.15rem 0.6rem;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            white-space: nowrap;
        }

        /* ── Section titles ── */
        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        @media (max-width: 640px) {
            .reports-grid { grid-template-columns: 1fr; }
            .page-header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <script src="scripts/navbar.js"></script>

    <header class="page-header">
        <div class="container">
            <span class="tier-label">Voidspire</span>
            <h1>WarcraftLogs</h1>
            <p>Rapports de raid et performances de la guilde</p>
        </div>
    </header>

    <main class="content-section">
        <div class="container">

            <!-- Chargement -->
            <div class="load-progress" id="loadProgress">
                <span id="loadText">Chargement des reports…</span>
                <div class="load-bar-wrap">
                    <div class="load-bar" id="loadBar"></div>
                </div>
            </div>

            <!-- Erreur -->
            <div class="status-box" id="errorBox">
                <div class="status-box-icon">⚠</div>
                <h3>Impossible de charger les données</h3>
                <p id="errorMsg">Une erreur est survenue lors de la récupération des reports.</p>
            </div>

            <!-- Aucun report -->
            <div class="status-box" id="emptyBox">
                <div class="status-box-icon">📋</div>
                <h3>Aucun report trouvé</h3>
                <p>Aucun log de raid n'a encore été enregistré pour la guilde.</p>
            </div>

            <!-- Reports -->
            <div id="reportsSection" style="display:none">
                <h2 class="section-title">Reports récents</h2>
                <div class="reports-grid" id="reportsGrid"></div>
            </div>

        </div>
    </main>

    <script>
        const WCL_API = 'https://europe-west1-guild-roster-67da7.cloudfunctions.net/getWclData';

        const DIFF_CLASS = { 'Normal': '', 'Héroïque': 'heroic', 'Mythique': 'mythic' };

        function setProgress(pct, text) {
            document.getElementById('loadBar').style.width = pct + '%';
            if (text) document.getElementById('loadText').textContent = text;
        }

        function formatDate(ms) {
            return new Date(ms).toLocaleDateString('fr-FR', {
                day: '2-digit', month: 'long', year: 'numeric'
            });
        }

        function formatDuration(startMs, endMs) {
            if (!endMs) return '';
            const diff = Math.round((endMs - startMs) / 60000);
            const h = Math.floor(diff / 60);
            const m = diff % 60;
            return h > 0 ? `${h}h${String(m).padStart(2,'0')}` : `${m} min`;
        }

        function renderReports(reports) {
            const grid = document.getElementById('reportsGrid');
            grid.innerHTML = '';

            reports.forEach(r => {
                const duration = formatDuration(r.startTime, r.endTime);
                const killCount = r.kills.length;

                const killsHtml = killCount > 0
                    ? r.kills.map(k => {
                        const cls = DIFF_CLASS[k.difficulty] || '';
                        return `<span class="kill-tag ${cls}">${k.name}</span>`;
                      }).join('')
                    : `<span class="no-kills">Aucun boss tué</span>`;

                const card = document.createElement('div');
                card.className = 'report-card';
                card.innerHTML = `
                    <div class="report-header">
                        <div>
                            <div class="report-date">${formatDate(r.startTime)}</div>
                            ${r.title ? `<div class="report-title">${escHtml(r.title)}</div>` : ''}
                            ${r.owner ? `<div class="report-owner">par ${escHtml(r.owner)}</div>` : ''}
                        </div>
                        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.3rem">
                            ${duration ? `<span class="report-duration">${duration}</span>` : ''}
                            <span class="kill-count-badge">${killCount} kill${killCount !== 1 ? 's' : ''}</span>
                        </div>
                    </div>
                    <div class="kill-list">${killsHtml}</div>
                    <div class="report-footer">
                        <a href="${r.url}" target="_blank" rel="noopener noreferrer" class="report-link">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
                                <polyline points="15 3 21 3 21 9"/>
                                <line x1="10" y1="14" x2="21" y2="3"/>
                            </svg>
                            Voir sur WarcraftLogs
                        </a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function escHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        async function loadReports() {
            setProgress(20, 'Connexion à WarcraftLogs…');
            try {
                const resp = await fetch(`${WCL_API}?type=reports`);
                setProgress(70, 'Traitement des données…');

                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({}));
                    throw new Error(err.error || `HTTP ${resp.status}`);
                }

                const { reports } = await resp.json();
                setProgress(100);
                document.getElementById('loadProgress').style.display = 'none';

                if (!reports || reports.length === 0) {
                    document.getElementById('emptyBox').classList.add('visible');
                    return;
                }

                document.getElementById('reportsSection').style.display = 'block';
                renderReports(reports);

            } catch (err) {
                document.getElementById('loadProgress').style.display = 'none';
                document.getElementById('errorMsg').textContent = err.message;
                document.getElementById('errorBox').classList.add('visible');
                console.error('WCL fetch error:', err);
            }
        }

        loadReports();
    </script>
</body>
</html>
