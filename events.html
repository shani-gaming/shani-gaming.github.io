<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Événements — Les Sages de Pandarie</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/common.css">

    <style>
        body { padding-top: 70px; background: var(--bg-deep); }

        /* ── Page Header ── */
        .page-header {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            padding: 4rem 0 2.5rem;
        }
        .page-header-row {
            display: flex; align-items: flex-end;
            justify-content: space-between; gap: 1rem; flex-wrap: wrap;
        }
        .page-label {
            display: inline-flex; align-items: center; gap: 0.4rem;
            font-size: 0.8rem; font-weight: 700; letter-spacing: 0.1em;
            text-transform: uppercase; color: var(--primary);
            border: 1px solid var(--primary); border-radius: 4px;
            padding: 0.15rem 0.6rem; margin-bottom: 0.75rem;
        }
        .live-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--accent); animation: pulse-dot 2s ease infinite;
        }
        @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
        .page-header h1 { font-size: 3rem; margin-bottom: 0.5rem; }
        .page-header p  { color: var(--text-muted); font-size: 1.1rem; }

        /* ── View Toggle ── */
        .view-toggle {
            display: inline-flex;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 3px;
            gap: 2px;
            align-self: flex-end;
        }
        .view-btn {
            padding: 0.4rem 1rem;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            display: flex; align-items: center; gap: 0.4rem;
        }
        .view-btn:hover { color: var(--text); }
        .view-btn.active {
            background: var(--bg-surface);
            color: var(--primary);
            border: 1px solid rgba(238,187,85,0.2);
        }

        /* ── Content ── */
        .content { padding: 2.5rem 0 5rem; }

        /* ════════════════════════════════════
           LIST VIEW
        ════════════════════════════════════ */
        .month-group { margin-bottom: 2.5rem; }
        .month-label {
            font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em;
            text-transform: uppercase; color: var(--text-muted);
            padding-bottom: 0.75rem; border-bottom: 1px solid var(--border);
            margin-bottom: 1rem;
        }
        .event-card {
            display: grid; grid-template-columns: 80px 1fr auto;
            align-items: start; gap: 1.25rem;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; margin-bottom: 0.75rem;
            transition: border-color 0.2s, transform 0.2s;
            position: relative; overflow: hidden; cursor: pointer;
        }
        .event-card::before {
            content: ''; position: absolute;
            top: 0; left: 0; bottom: 0; width: 3px;
            background: var(--primary); border-radius: 3px 0 0 3px; z-index: 1;
        }
        .event-card:hover { border-color: rgba(238,187,85,0.4); transform: translateX(3px); }
        .event-banner {
            position: absolute; top: 0; right: 0; bottom: 0; width: 40%;
            background-size: cover; background-position: center;
            mask-image: linear-gradient(to left, rgba(0,0,0,0.35) 0%, transparent 100%);
            -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,0.35) 0%, transparent 100%);
            pointer-events: none;
        }
        .event-date-block {
            text-align: center; background: var(--bg-surface);
            border-radius: 8px; padding: 0.6rem 0.4rem;
            border: 1px solid var(--border); margin: 1.25rem 0 1.25rem 1.5rem; z-index: 1;
        }
        .event-day-name  { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
        .event-day-num   { font-size: 1.8rem; font-weight: 800; line-height: 1; color: var(--primary); margin: 0.1rem 0; }
        .event-month-name{ font-size: 0.68rem; font-weight: 600; text-transform: uppercase; color: var(--text-muted); }
        .event-body { padding: 1.25rem 0; z-index: 1; }
        .event-title { font-size: 1.05rem; font-weight: 700; color: var(--text-main); margin-bottom: 0.4rem; line-height: 1.3; }
        .event-time-row  { font-size: 0.82rem; color: var(--primary); font-weight: 600; margin-bottom: 0.5rem; }
        .event-desc-preview {
            font-size: 0.82rem; color: var(--text-muted); line-height: 1.55;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .event-meta {
            display: flex; flex-direction: column; align-items: flex-end;
            gap: 0.5rem; padding: 1.25rem 1.5rem 1.25rem 0; min-width: 100px; z-index: 1;
        }
        .signup-badge {
            display: inline-flex; align-items: center; gap: 0.35rem;
            background: var(--accent-dim); color: var(--accent);
            border-radius: 20px; padding: 0.25rem 0.75rem;
            font-size: 0.78rem; font-weight: 700; white-space: nowrap;
        }
        .leader-badge { font-size: 0.72rem; color: var(--text-muted); text-align: right; }
        .details-hint { font-size: 0.7rem; color: var(--primary); opacity: 0.7; white-space: nowrap; }

        /* ════════════════════════════════════
           CALENDAR VIEW
        ════════════════════════════════════ */
        .cal-wrap { display: none; }
        .cal-wrap.active { display: block; }

        /* Navigation */
        .cal-nav {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1.5rem;
        }
        .cal-nav-title {
            font-size: 1.3rem; font-weight: 800; letter-spacing: 0.02em;
        }
        .cal-nav-btns { display: flex; align-items: center; gap: 0.5rem; }
        .cal-arrow {
            width: 36px; height: 36px; border-radius: 8px;
            background: var(--bg-card); border: 1px solid var(--border);
            color: var(--text-muted); font-size: 1.1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; font-family: inherit;
        }
        .cal-arrow:hover { border-color: var(--primary); color: var(--primary); }
        .cal-today-btn {
            padding: 0.35rem 0.85rem; border-radius: 8px;
            background: var(--bg-card); border: 1px solid var(--border);
            color: var(--text-muted); font-size: 0.78rem; font-weight: 600;
            cursor: pointer; font-family: inherit; transition: all 0.2s;
        }
        .cal-today-btn:hover { border-color: var(--primary); color: var(--primary); }

        /* Day-of-week header */
        .cal-days-header {
            display: grid; grid-template-columns: repeat(7, 1fr);
            gap: 4px; margin-bottom: 4px;
        }
        .cal-day-hdr {
            text-align: center; font-size: 0.7rem; font-weight: 700;
            letter-spacing: 0.08em; text-transform: uppercase;
            color: var(--text-muted); padding: 0.4rem 0;
        }
        .cal-day-hdr.weekend { color: rgba(238,187,85,0.5); }

        /* Calendar grid */
        .cal-grid {
            display: grid; grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        /* Day cell */
        .cal-cell {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            min-height: 90px;
            padding: 0.5rem;
            position: relative;
            transition: border-color 0.15s;
            cursor: default;
        }
        .cal-cell.other-month {
            opacity: 0.3;
        }
        .cal-cell.today {
            border-color: var(--primary);
            background: rgba(238,187,85,0.04);
        }
        .cal-cell.has-events { cursor: pointer; }
        .cal-cell.has-events:hover { border-color: rgba(238,187,85,0.5); background: rgba(238,187,85,0.04); }

        .cal-day-num {
            font-size: 0.78rem; font-weight: 700; color: var(--text-muted);
            margin-bottom: 0.35rem; line-height: 1;
        }
        .cal-cell.today .cal-day-num {
            color: var(--primary);
        }

        /* Today dot */
        .today-dot {
            display: inline-flex; align-items: center; justify-content: center;
            width: 20px; height: 20px; border-radius: 50%;
            background: var(--primary); color: var(--bg-deep);
            font-size: 0.72rem; font-weight: 800;
        }

        /* Event pill inside cell */
        .cal-event-pill {
            display: flex; align-items: center; gap: 0.3rem;
            padding: 0.2rem 0.45rem; border-radius: 4px;
            background: rgba(238,187,85,0.1);
            border: 1px solid rgba(238,187,85,0.2);
            margin-bottom: 3px; cursor: pointer;
            transition: background 0.15s;
            overflow: hidden; min-width: 0;
        }
        .cal-event-pill:hover { background: rgba(238,187,85,0.18); }
        .cal-event-pill-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--primary); flex-shrink: 0; }
        .cal-event-pill-title {
            font-size: 0.65rem; font-weight: 600; color: var(--primary);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            flex: 1; min-width: 0;
        }
        .cal-event-pill-time {
            font-size: 0.6rem; color: var(--text-muted); margin-left: auto;
            flex-shrink: 0; white-space: nowrap;
        }

        /* More events overflow */
        .cal-more {
            font-size: 0.62rem; font-weight: 600; color: var(--text-muted);
            padding: 0.1rem 0.3rem;
        }

        @media (max-width: 768px) {
            .cal-cell { min-height: 60px; padding: 0.3rem; }
            .cal-event-pill-time { display: none; }
            .cal-event-pill { padding: 0.15rem 0.3rem; }
        }
        @media (max-width: 480px) {
            .cal-event-pill-title { display: none; }
            .cal-event-pill { justify-content: center; }
            .cal-event-pill-dot { width: 6px; height: 6px; }
        }

        /* ════════════════════════════════════
           MODAL
        ════════════════════════════════════ */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px); z-index: 3000;
            display: none; align-items: center; justify-content: center; padding: 1rem;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: 16px; width: 100%; max-width: 720px;
            max-height: 90vh; overflow-y: auto; position: relative;
            box-shadow: 0 0 60px rgba(0,0,0,0.6);
        }
        .modal-banner {
            width: 100%; height: 180px; object-fit: cover;
            border-radius: 16px 16px 0 0; display: block;
        }
        .modal-banner-placeholder {
            width: 100%; height: 80px; background: var(--bg-card);
            border-radius: 16px 16px 0 0;
        }
        .modal-close {
            position: absolute; top: 0.75rem; right: 0.75rem;
            background: rgba(0,0,0,0.5); border: none; border-radius: 50%;
            width: 32px; height: 32px; color: #fff; font-size: 1.1rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10;
        }
        .modal-close:hover { background: rgba(0,0,0,0.8); }
        .modal-body { padding: 1.5rem; }
        .modal-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 0.3rem; }
        .modal-sub { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 1.25rem; }
        .modal-sub span { color: var(--primary); font-weight: 600; }
        .role-summary { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .role-pill {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.35rem 0.9rem; border-radius: 20px;
            font-size: 0.82rem; font-weight: 700; border: 1px solid;
        }
        .role-pill.tanks   { background: rgba(196,30,58,0.15);  color: #f87171; border-color: rgba(196,30,58,0.3); }
        .role-pill.melee   { background: rgba(198,155,109,0.15); color: #C69B6D; border-color: rgba(198,155,109,0.3); }
        .role-pill.ranged  { background: rgba(63,199,235,0.15);  color: #3FC7EB; border-color: rgba(63,199,235,0.3); }
        .role-pill.healers { background: rgba(51,255,170,0.15);  color: var(--accent); border-color: rgba(51,255,170,0.3); }
        .signup-section { margin-bottom: 1.25rem; }
        .signup-section-title {
            font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em;
            text-transform: uppercase; color: var(--text-muted);
            margin-bottom: 0.5rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border);
        }
        .signup-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.4rem; }
        .signup-row {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.35rem 0.5rem; border-radius: 6px; background: var(--bg-card);
        }
        .class-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .signup-name { font-size: 0.82rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .signup-spec { font-size: 0.7rem; color: var(--text-muted); margin-left: auto; white-space: nowrap; }
        .absence-list { display: flex; flex-wrap: wrap; gap: 0.4rem; }
        .absence-chip {
            font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 4px;
            background: rgba(248,113,113,0.1); color: #f87171; border: 1px solid rgba(248,113,113,0.2);
        }
        .modal-loading {
            display: flex; align-items: center; justify-content: center;
            padding: 3rem; gap: 0.75rem; color: var(--text-muted); font-size: 0.9rem;
        }
        .spinner {
            width: 20px; height: 20px; border: 2px solid var(--border);
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Misc ── */
        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
        .empty-state p { font-size: 0.95rem; margin-top: 0.5rem; opacity: 0.6; }
        .skeleton-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; height: 100px; margin-bottom: 0.75rem;
            animation: shimmer 1.4s ease infinite;
        }
        @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:0.4} }

        @media (max-width: 640px) {
            .event-card { grid-template-columns: 64px 1fr; }
            .event-date-block { margin-left: 1rem; }
            .event-meta { display: none; }
            .event-banner { width: 30%; }
            .signup-list { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <nav class="navbar"></nav>
    <script src="scripts/navbar.js"></script>

    <div class="page-header">
        <div class="container">
            <div class="page-header-row">
                <div>
                    <div class="page-label"><span class="live-dot"></span> Raid-Helper</div>
                    <h1>Calendrier des Événements</h1>
                    <p>Les Sages de Pandarie · Hyjal · synchronisé depuis Discord</p>
                </div>
                <div class="view-toggle">
                    <button class="view-btn active" id="btnList">
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="0" y="1" width="14" height="2" rx="1" fill="currentColor"/><rect x="0" y="6" width="14" height="2" rx="1" fill="currentColor"/><rect x="0" y="11" width="14" height="2" rx="1" fill="currentColor"/></svg>
                        Liste
                    </button>
                    <button class="view-btn" id="btnCal">
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="2" width="12" height="11" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M1 5h12" stroke="currentColor" stroke-width="1.5"/><path d="M4 1v2M10 1v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><rect x="3" y="7" width="2" height="2" rx="0.5" fill="currentColor"/><rect x="6" y="7" width="2" height="2" rx="0.5" fill="currentColor"/><rect x="3" y="10" width="2" height="2" rx="0.5" fill="currentColor"/><rect x="6" y="10" width="2" height="2" rx="0.5" fill="currentColor"/></svg>
                        Calendrier
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="content">
        <div class="container">

            <!-- LIST VIEW -->
            <div id="listWrap">
                <div id="events-container">
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                </div>
            </div>

            <!-- CALENDAR VIEW -->
            <div class="cal-wrap" id="calWrap">
                <div class="cal-nav">
                    <div class="cal-nav-title" id="calTitle">—</div>
                    <div class="cal-nav-btns">
                        <button class="cal-today-btn" id="calTodayBtn">Aujourd'hui</button>
                        <button class="cal-arrow" id="calPrev">‹</button>
                        <button class="cal-arrow" id="calNext">›</button>
                    </div>
                </div>
                <div class="cal-days-header">
                    <div class="cal-day-hdr">Lun</div>
                    <div class="cal-day-hdr">Mar</div>
                    <div class="cal-day-hdr">Mer</div>
                    <div class="cal-day-hdr">Jeu</div>
                    <div class="cal-day-hdr">Ven</div>
                    <div class="cal-day-hdr weekend">Sam</div>
                    <div class="cal-day-hdr weekend">Dim</div>
                </div>
                <div class="cal-grid" id="calGrid"></div>
            </div>

        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="eventModal">
        <div class="modal-box">
            <button class="modal-close" id="modalClose">✕</button>
            <div id="modalContent"><div class="modal-loading"><div class="spinner"></div> Chargement…</div></div>
        </div>
    </div>

    <script>
    const EVENTS_API  = 'https://europe-west1-guild-roster-67da7.cloudfunctions.net/getRaidHelperEvents';
    const DETAILS_API = 'https://europe-west1-guild-roster-67da7.cloudfunctions.net/getEventDetails';

    const DAYS_SHORT   = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
    const MONTHS_FR    = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
    const MONTHS_SHORT = ['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sep','Oct','Nov','Déc'];

    const CLASS_COLORS = {
        warrior:'#C69B6D', paladin:'#F48CBA', hunter:'#AAD372', rogue:'#FFF468',
        priest:'#FFFFFF',  shaman:'#0070DD',  mage:'#3FC7EB',   warlock:'#8788EE',
        monk:'#00FF98',    druid:'#FF7C0A',   evoker:'#33937F',
        dh:'#A330C9', 'demon hunter':'#A330C9',
        dk:'#C41E3A', 'death knight':'#C41E3A',
    };
    function classColor(c) {
        if (!c) return '#888';
        const k = c.toLowerCase();
        return CLASS_COLORS[k] || CLASS_COLORS[k.replace(' ','')] || '#888';
    }
    function fmtTime(ts) {
        const d = new Date(ts * 1000);
        return `${String(d.getHours()).padStart(2,'0')}h${String(d.getMinutes()).padStart(2,'0')}`;
    }
    function fmtDateLong(ts) {
        const d = new Date(ts * 1000);
        return `${['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'][d.getDay()]} ${d.getDate()} ${MONTHS_FR[d.getMonth()]} ${d.getFullYear()}`;
    }
    function extractTitle(e) {
        if (e.title && e.title !== 'unnamed') return e.title;
        const line = (e.description||'').split('\n')[0].trim();
        return line.replace(/^[\p{Emoji}\s\[\]]+/u,'').replace(/\s*[—–-]\s*.*/,'').trim() || 'Événement';
    }
    function extractDesc(e) {
        const lines = (e.description||'').split('\n').slice(1);
        return lines.filter(l => l.trim() && !/^[📅🕘🕙🕚]/.test(l)).join('\n').trim();
    }
    function groupByMonth(events) {
        const groups = {};
        events.forEach(e => {
            const d = new Date(e.startTime * 1000);
            const k = `${d.getFullYear()}-${d.getMonth()}`;
            if (!groups[k]) groups[k] = { label: `${MONTHS_FR[d.getMonth()]} ${d.getFullYear()}`, events: [] };
            groups[k].events.push(e);
        });
        return Object.values(groups);
    }

    // ── Global events store ────────────────────────────────────────────────────
    let allEvents = [];

    // ── View toggle ───────────────────────────────────────────────────────────
    let currentView = 'list';

    document.getElementById('btnList').addEventListener('click', () => setView('list'));
    document.getElementById('btnCal').addEventListener('click',  () => setView('calendar'));

    function setView(v) {
        currentView = v;
        document.getElementById('btnList').classList.toggle('active', v === 'list');
        document.getElementById('btnCal').classList.toggle('active',  v === 'calendar');
        document.getElementById('listWrap').style.display = v === 'list'     ? '' : 'none';
        document.getElementById('calWrap').classList.toggle('active', v === 'calendar');
        if (v === 'calendar') renderCalendar();
    }

    // ── LIST VIEW ─────────────────────────────────────────────────────────────
    function renderList(events) {
        const container = document.getElementById('events-container');
        if (!events.length) {
            container.innerHTML = `<div class="empty-state"><div style="font-size:2rem">📅</div><p>Aucun événement à venir.</p></div>`;
            return;
        }
        const groups = groupByMonth(events);
        container.innerHTML = groups.map(g => `
            <div class="month-group">
                <div class="month-label">${g.label}</div>
                ${g.events.map(renderEventCard).join('')}
            </div>`).join('');
    }

    function renderEventCard(e) {
        const d      = new Date(e.startTime * 1000);
        const title  = extractTitle(e);
        const desc   = extractDesc(e);
        const time   = fmtTime(e.startTime);
        const endT   = e.endTime && e.endTime !== e.startTime ? ` — ${fmtTime(e.endTime)}` : '';
        const banner = e.imageUrl ? `<div class="event-banner" style="background-image:url('${e.imageUrl}')"></div>` : '';

        return `
            <div class="event-card" data-eid="${e.id}">
                ${banner}
                <div class="event-date-block">
                    <div class="event-day-name">${DAYS_SHORT[d.getDay()]}</div>
                    <div class="event-day-num">${d.getDate()}</div>
                    <div class="event-month-name">${MONTHS_SHORT[d.getMonth()]}</div>
                </div>
                <div class="event-body">
                    <div class="event-title">${title}</div>
                    <div class="event-time-row">${time}${endT}</div>
                    ${desc ? `<div class="event-desc-preview">${desc.replace(/\n/g,' · ').substring(0,120)}</div>` : ''}
                </div>
                <div class="event-meta">
                    <span class="signup-badge">⚔ ${e.signUps} inscrit${e.signUps > 1 ? 's' : ''}</span>
                    ${e.leader ? `<div class="leader-badge">RL : ${e.leader}</div>` : ''}
                    <div class="details-hint">Voir les inscrits →</div>
                </div>
            </div>`;
    }

    // Delegation for list cards
    document.getElementById('listWrap').addEventListener('click', e => {
        const card = e.target.closest('[data-eid]');
        if (card) openModal(card.dataset.eid);
    });

    // ── CALENDAR VIEW ─────────────────────────────────────────────────────────
    const today = new Date();
    let calYear  = today.getFullYear();
    let calMonth = today.getMonth();

    document.getElementById('calPrev').addEventListener('click', () => {
        calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; }
        renderCalendar();
    });
    document.getElementById('calNext').addEventListener('click', () => {
        calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; }
        renderCalendar();
    });
    document.getElementById('calTodayBtn').addEventListener('click', () => {
        calYear = today.getFullYear(); calMonth = today.getMonth();
        renderCalendar();
    });

    function renderCalendar() {
        document.getElementById('calTitle').textContent = `${MONTHS_FR[calMonth]} ${calYear}`;

        // Build events-by-day map for this month
        const evByDay = {};
        allEvents.forEach(e => {
            const d = new Date(e.startTime * 1000);
            if (d.getFullYear() === calYear && d.getMonth() === calMonth) {
                const day = d.getDate();
                if (!evByDay[day]) evByDay[day] = [];
                evByDay[day].push(e);
            }
        });

        // First day of month (adjust: Mon=0)
        const firstDay = new Date(calYear, calMonth, 1);
        let startDow = firstDay.getDay(); // 0=Sun
        startDow = startDow === 0 ? 6 : startDow - 1; // convert to Mon=0

        const daysInMonth   = new Date(calYear, calMonth + 1, 0).getDate();
        const daysInPrevMonth = new Date(calYear, calMonth, 0).getDate();

        const grid = document.getElementById('calGrid');
        grid.innerHTML = '';

        const totalCells = Math.ceil((startDow + daysInMonth) / 7) * 7;

        for (let i = 0; i < totalCells; i++) {
            const cell = document.createElement('div');
            cell.className = 'cal-cell';

            let dayNum, isCurrentMonth;
            if (i < startDow) {
                dayNum = daysInPrevMonth - startDow + i + 1;
                isCurrentMonth = false;
            } else if (i >= startDow + daysInMonth) {
                dayNum = i - startDow - daysInMonth + 1;
                isCurrentMonth = false;
            } else {
                dayNum = i - startDow + 1;
                isCurrentMonth = true;
            }

            if (!isCurrentMonth) cell.classList.add('other-month');

            const isToday = isCurrentMonth
                && dayNum === today.getDate()
                && calMonth === today.getMonth()
                && calYear === today.getFullYear();

            if (isToday) cell.classList.add('today');

            // Day number
            const numEl = document.createElement('div');
            numEl.className = 'cal-day-num';
            if (isToday) {
                numEl.innerHTML = `<span class="today-dot">${dayNum}</span>`;
            } else {
                numEl.textContent = dayNum;
            }
            cell.appendChild(numEl);

            // Events
            if (isCurrentMonth && evByDay[dayNum]) {
                cell.classList.add('has-events');
                const evList = evByDay[dayNum];
                const show   = evList.slice(0, 3);
                const more   = evList.length - show.length;

                show.forEach(e => {
                    const pill = document.createElement('div');
                    pill.className = 'cal-event-pill';
                    pill.dataset.eid = e.id;
                    pill.innerHTML = `
                        <span class="cal-event-pill-dot"></span>
                        <span class="cal-event-pill-title">${extractTitle(e)}</span>
                        <span class="cal-event-pill-time">${fmtTime(e.startTime)}</span>`;
                    cell.appendChild(pill);
                });

                if (more > 0) {
                    const moreEl = document.createElement('div');
                    moreEl.className = 'cal-more';
                    moreEl.textContent = `+${more} autre${more > 1 ? 's' : ''}`;
                    cell.appendChild(moreEl);
                }
            }

            grid.appendChild(cell);
        }
    }

    // Delegation for calendar
    document.getElementById('calGrid').addEventListener('click', e => {
        const pill = e.target.closest('[data-eid]');
        if (pill) { e.stopPropagation(); openModal(pill.dataset.eid); return; }
        const cell = e.target.closest('.has-events');
        if (cell) {
            const firstPill = cell.querySelector('[data-eid]');
            if (firstPill) openModal(firstPill.dataset.eid);
        }
    });

    // ── Modal ─────────────────────────────────────────────────────────────────
    const modal = document.getElementById('eventModal');
    const modalContent = document.getElementById('modalContent');

    document.getElementById('modalClose').addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    function closeModal() { modal.classList.remove('open'); }

    async function openModal(eventId) {
        modalContent.innerHTML = '<div class="modal-loading"><div class="spinner"></div> Chargement…</div>';
        modal.classList.add('open');
        try {
            const res  = await fetch(`${DETAILS_API}?eventId=${eventId}`);
            const data = await res.json();
            renderModal(data);
        } catch(err) {
            modalContent.innerHTML = '<div class="modal-loading">Erreur de chargement.</div>';
        }
    }

    function roleSectionHtml(label, players, cssClass) {
        if (!players.length) return '';
        const rows = players.map(p => {
            const color = classColor(p.class);
            return `<div class="signup-row">
                <span class="class-dot" style="background:${color}"></span>
                <span class="signup-name" style="color:${color}">${p.name}</span>
                <span class="signup-spec">${p.spec||''}</span>
            </div>`;
        }).join('');
        return `<div class="signup-section">
            <div class="signup-section-title ${cssClass}">${label} (${players.length})</div>
            <div class="signup-list">${rows}</div>
        </div>`;
    }

    function renderModal(d) {
        const title    = extractTitle({ title: d.title, description: '' });
        const rs       = d.roleSummary || {};
        const tanks    = (d.signUps||[]).filter(s => s.role === 'Tanks');
        const melee    = (d.signUps||[]).filter(s => s.role === 'Melee');
        const ranged   = (d.signUps||[]).filter(s => s.role === 'Ranged');
        const healers  = (d.signUps||[]).filter(s => s.role === 'Healers');
        const absences = d.absences  || [];
        const bench    = d.bench     || [];
        const late     = d.late      || [];
        const tentative= d.tentative || [];

        const bannerHtml = d.imageUrl
            ? `<img class="modal-banner" src="${d.imageUrl}" alt="">`
            : '<div class="modal-banner-placeholder"></div>';

        const absHtml = absences.length ? `<div class="signup-section">
            <div class="signup-section-title">Absences (${absences.length})</div>
            <div class="absence-list">${absences.map(p => `<span class="absence-chip">${p.name}</span>`).join('')}</div>
        </div>` : '';

        const otherHtml = [
            bench.length     ? `<span class="absence-chip" style="background:rgba(161,139,250,0.1);color:#a78bfa;border-color:rgba(161,139,250,0.2)">Banc (${bench.length})</span>` : '',
            late.length      ? `<span class="absence-chip" style="background:rgba(251,146,60,0.1);color:#fb923c;border-color:rgba(251,146,60,0.2)">Retard (${late.length})</span>` : '',
            tentative.length ? `<span class="absence-chip" style="background:rgba(107,114,128,0.1);color:#9ca3af;border-color:rgba(107,114,128,0.2)">Tentative (${tentative.length})</span>` : '',
        ].filter(Boolean).join('');

        modalContent.innerHTML = `
            ${bannerHtml}
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-body">
                <div class="modal-title">${title}</div>
                <div class="modal-sub">
                    <span>${fmtDateLong(d.startTime)}</span> · <span>${fmtTime(d.startTime)}</span>
                    ${d.leader ? ` · RL : <span>${d.leader}</span>` : ''}
                </div>
                <div class="role-summary">
                    ${rs.Tanks   ? `<span class="role-pill tanks">🛡 Tanks ${rs.Tanks}</span>`      : ''}
                    ${rs.Melee   ? `<span class="role-pill melee">⚔ Mêlée ${rs.Melee}</span>`      : ''}
                    ${rs.Ranged  ? `<span class="role-pill ranged">🏹 Distance ${rs.Ranged}</span>` : ''}
                    ${rs.Healers ? `<span class="role-pill healers">✚ Soins ${rs.Healers}</span>`   : ''}
                </div>
                ${roleSectionHtml('Tanks',    tanks,   'tanks')}
                ${roleSectionHtml('Mêlée',    melee,   'melee')}
                ${roleSectionHtml('Distance', ranged,  'ranged')}
                ${roleSectionHtml('Soins',    healers, 'healers')}
                ${absHtml}
                ${otherHtml ? `<div class="absence-list" style="margin-top:0.5rem">${otherHtml}</div>` : ''}
            </div>`;
    }

    // ── Load Events ───────────────────────────────────────────────────────────
    async function loadEvents() {
        try {
            const res = await fetch(EVENTS_API);
            const { events } = await res.json();
            allEvents = events;

            if (currentView === 'list') renderList(events);
            else renderCalendar();
        } catch(err) {
            document.getElementById('events-container').innerHTML =
                `<div class="empty-state"><div style="font-size:2rem">⚠</div><p>Impossible de charger les événements.</p></div>`;
        }
    }

    loadEvents();
    </script>

</body>
</html>
