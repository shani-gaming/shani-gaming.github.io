<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Composition de Raid — Les Sages de Pandarie</title>
    <link rel="icon" type="image/png" href="../img/logo.png">
    <meta name="description" content="Outil de composition de raid des Sages de Pandarie — répartition des rôles et classes.">
    <meta property="og:title" content="Composition de Raid — Les Sages de Pandarie">
    <meta property="og:description" content="Outil de composition de raid des Sages de Pandarie — répartition des rôles et classes.">
    <meta property="og:image" content="https://www.sagesdepandarie.ovh/img/logo.png">
    <meta property="og:url" content="https://www.sagesdepandarie.ovh/composition/">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="../styles/common.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="../scripts/firebase-init.js"></script>
    <script src="../scripts/class-icons.js"></script>

    <style>
        /* Page-specific variables */
        :root {
            --bg-elevated: #2a2f38;
            --text-secondary: #b1bac4;

            /* WoW Role Colors */
            --tank: #C41E3A;
            --healer: #00FF98;
            --dps-melee: #C69B6D;
            --dps-ranged: #3FC7EB;

            /* WoW Class Colors */
            --warrior: #C69B6D;
            --paladin: #F48CBA;
            --hunter: #AAD372;
            --rogue: #FFF468;
            --priest: #FFFFFF;
            --shaman: #0070DD;
            --mage: #3FC7EB;
            --warlock: #8788EE;
            --monk: #00FF98;
            --druid: #FF7C0A;
            --dh: #A330C9;
            --dk: #C41E3A;
            --evoker: #33937F;
        }

        body {
            padding-top: 80px;
        }

        .page-container {
            display: grid;
            grid-template-columns: 300px 1fr 280px;
            gap: 1.5rem;
            min-height: calc(100vh - 80px);
            padding: 2rem;
            max-width: 1800px;
            margin: 0 auto;
        }

        /* ── Left Panel – Member List ── */
        .members-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 120px);
            position: sticky;
            top: 90px;
        }

        .panel-header {
            margin-bottom: 1rem;
        }

        .panel-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .panel-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Grade Filters */
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .filter-btn {
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--bg-deep);
        }

        /* Member List */
        .member-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .member-list::-webkit-scrollbar { width: 6px; }
        .member-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 3px; }
        .member-list::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

        .member-card {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: grab;
            transition: all 0.2s;
            user-select: none;
        }

        .member-card:hover {
            border-color: var(--primary);
            transform: translateX(4px);
        }

        .member-card.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .member-card.in-raid {
            opacity: 0.35;
            pointer-events: none;
        }

        .member-class-icon {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            flex-shrink: 0;
        }

        .member-info {
            flex: 1;
            min-width: 0;
        }

        .member-name {
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .member-details {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .member-ilvl {
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: 600;
            flex-shrink: 0;
        }

        /* ── Center Panel – Raid Composition ── */
        .composition-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .composition-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .composition-header-left { display: flex; flex-direction: column; gap: 0.15rem; }

        .raid-count {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .raid-count strong {
            color: var(--primary);
            font-size: 1.2rem;
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .clear-btn {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        /* Load Event Button */
        .load-event-btn {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1rem;
            background: rgba(212,175,55,0.08);
            border: 1px solid rgba(212,175,55,0.35);
            border-radius: 6px;
            color: var(--primary);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .load-event-btn:hover {
            background: rgba(212,175,55,0.16);
            border-color: var(--primary);
        }

        .load-event-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Event Banner */
        .event-banner {
            display: none;
            background: linear-gradient(135deg, rgba(212,175,55,0.1), rgba(212,175,55,0.04));
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            gap: 0.75rem;
            align-items: flex-start;
        }

        .event-banner.visible { display: flex; }

        .event-banner-icon { font-size: 1.2rem; flex-shrink: 0; margin-top: 1px; }

        .event-banner-body { flex: 1; min-width: 0; }

        .event-banner-title {
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .event-banner-meta { color: var(--text-muted); font-size: 0.8rem; line-height: 1.5; }

        .event-banner-unmatched {
            color: #ff9800;
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }

        .event-banner-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 0;
            line-height: 1;
            flex-shrink: 0;
            transition: color 0.2s;
        }

        .event-banner-close:hover { color: #ff6b6b; }

        /* Buff Mini-Bar */
        .buff-bar {
            display: flex;
            gap: 0.35rem;
            flex-wrap: wrap;
            padding: 0.6rem 0.75rem;
            background: var(--bg-elevated);
            border-radius: 8px;
            border: 1px solid var(--border);
            align-items: center;
        }

        .buff-bar-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.07em;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-right: 0.2rem;
            flex-shrink: 0;
        }

        .buff-dot {
            position: relative;
            width: 28px;
            height: 28px;
            flex-shrink: 0;
        }

        .buff-dot img {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            border: 1px solid transparent;
            display: block;
        }

        .buff-dot.available img {
            border-color: rgba(76,175,80,0.6);
        }

        .buff-dot.missing img {
            filter: grayscale(100%) brightness(0.4);
            border-color: rgba(255,107,107,0.3);
        }

        .buff-dot.missing::after {
            content: '×';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff6b6b;
            font-weight: 900;
            font-size: 0.9rem;
            pointer-events: none;
        }

        .buff-dot[data-tooltip]:hover::before {
            content: attr(data-tooltip);
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: #0d1117;
            color: #fff;
            font-size: 0.68rem;
            white-space: nowrap;
            padding: 3px 7px;
            border-radius: 4px;
            border: 1px solid var(--border);
            pointer-events: none;
            z-index: 50;
        }

        /* Role Sections */
        .role-sections {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            flex: 1;
        }

        .role-section {
            background: var(--bg-elevated);
            border: 2px dashed var(--border);
            border-radius: 10px;
            padding: 1rem;
            min-height: 200px;
            transition: all 0.2s;
        }

        .role-section.drag-over {
            border-color: var(--primary);
            background: rgba(238, 187, 85, 0.05);
        }

        .role-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .role-title {
            font-weight: 700;
            font-size: 0.9rem;
        }

        .role-title.tank   { color: var(--tank); }
        .role-title.healer { color: var(--healer); }
        .role-title.dps    { color: var(--dps-ranged); }

        .role-count {
            margin-left: auto;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .role-members {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .raid-member {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .raid-member .member-class-icon {
            width: 24px;
            height: 24px;
        }

        .raid-member .member-name {
            flex: 1;
            font-size: 0.85rem;
        }

        .remove-member {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.25rem;
            font-size: 1rem;
            line-height: 1;
            transition: color 0.2s;
        }

        .remove-member:hover { color: #ff6b6b; }

        /* ── Right Panel – Analysis ── */
        .analysis-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            position: sticky;
            top: 90px;
        }

        .analysis-panel .panel-title {
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .analysis-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .buff-category {
            background: var(--bg-elevated);
            border-radius: 8px;
            padding: 0.75rem;
        }

        .buff-category-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .buff-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .buff-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            padding: 0.35rem;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .buff-item.available {
            background: rgba(0, 255, 152, 0.1);
            border-left: 3px solid #00ff98;
        }

        .buff-item.missing {
            background: rgba(255, 107, 107, 0.1);
            border-left: 3px solid #ff6b6b;
            opacity: 0.6;
        }

        .buff-icon {
            width: 20px;
            height: 20px;
            border-radius: 3px;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }

        .buff-item.missing .buff-icon {
            filter: grayscale(100%);
        }

        .buff-name {
            flex: 1;
            font-size: 0.75rem;
            line-height: 1.2;
        }

        .buff-provider {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-align: right;
        }

        /* ── Mobile Tab Bar ── */
        .mobile-tab-bar {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: var(--bg-surface);
            border-top: 1px solid var(--border);
            z-index: 200;
            grid-template-columns: repeat(3, 1fr);
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.2rem;
            cursor: pointer;
            font-family: inherit;
            transition: color 0.2s;
            padding: 0;
        }

        .tab-btn:hover { color: var(--text-secondary); }

        .tab-btn.active { color: var(--primary); }

        .tab-icon { font-size: 1.4rem; line-height: 1; }

        /* ── Toast ── */
        .toast-container {
            position: fixed;
            bottom: 5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            align-items: center;
            pointer-events: none;
        }

        .toast {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.65rem 1.1rem;
            font-size: 0.85rem;
            white-space: nowrap;
            animation: toast-in 0.25s ease;
        }

        @keyframes toast-in {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .toast.success { border-color: var(--healer); color: var(--healer); }
        .toast.error   { border-color: #ff6b6b; color: #ff6b6b; }
        .toast.info    { border-color: rgba(238,187,85,0.4); color: var(--primary); }

        /* Loader */
        .loader-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* ── Responsive 1200px ── */
        @media (max-width: 1200px) {
            .page-container {
                grid-template-columns: 280px 1fr;
            }

            .analysis-panel {
                grid-column: 1 / -1;
                max-height: none;
                position: static;
            }

            .analysis-grid {
                flex-direction: row;
                flex-wrap: wrap;
            }

            .buff-category {
                flex: 1;
                min-width: 200px;
            }
        }

        /* ── Responsive 768px (mobile tabs) ── */
        @media (max-width: 768px) {
            body { padding-bottom: 64px; }

            .mobile-tab-bar { display: grid; }

            .page-container {
                display: block;
                padding: 0.75rem;
                min-height: 0;
            }

            /* Hide all panels; JS adds panel-visible to the active one */
            .members-panel,
            .composition-panel,
            .analysis-panel {
                display: none !important;
                position: static;
                max-height: calc(100vh - 160px);
                overflow-y: auto;
                border-radius: 8px;
            }

            .members-panel.panel-visible    { display: flex !important; }
            .composition-panel.panel-visible { display: flex !important; }
            .analysis-panel.panel-visible   { display: block !important; }

            /* Tap-to-add hint */
            .member-card {
                cursor: pointer;
            }

            /* Stack role sections vertically */
            .role-sections { grid-template-columns: 1fr; }

            /* Shrink composition header on small screens */
            .composition-header { flex-direction: column; align-items: flex-start; }
            .header-actions { width: 100%; justify-content: flex-start; }
        }
    </style>
</head>
<body>

    <nav class="navbar"></nav>
    <script src="../scripts/navbar.js"></script>

    <div class="page-container">

        <!-- ── Left Panel – Member List ── -->
        <div class="members-panel" id="membersPanel">
            <div class="panel-header">
                <h2 class="panel-title">Membres de la Guilde</h2>
                <p class="panel-subtitle" id="membersPanelSubtitle">Glissez les membres vers la composition</p>
            </div>

            <div class="filters" id="gradeFilters">
                <button class="filter-btn active" data-grade="all">Tous rangs</button>
            </div>

            <div class="filters" id="roleFilters" style="border-bottom: none; padding-bottom: 0;">
                <button class="filter-btn active" data-role="all"    onclick="filterByRole('all')">Tous</button>
                <button class="filter-btn" data-role="tank"   onclick="filterByRole('tank')"   style="border-color: var(--tank);">Tanks</button>
                <button class="filter-btn" data-role="healer" onclick="filterByRole('healer')" style="border-color: var(--healer);">Soins</button>
                <button class="filter-btn" data-role="dps"    onclick="filterByRole('dps')"    style="border-color: var(--dps-ranged);">DPS</button>
            </div>

            <div class="member-list" id="memberList">
                <div class="loader-container">
                    <div class="loader"></div>
                </div>
            </div>
        </div>

        <!-- ── Center Panel – Raid Composition ── -->
        <div class="composition-panel" id="compositionPanel">
            <div class="composition-header">
                <div class="composition-header-left">
                    <h2 class="panel-title">Composition de Raid</h2>
                    <p class="raid-count"><strong id="raidCount">0</strong> / 20 joueurs</p>
                </div>
                <div class="header-actions">
                    <button class="load-event-btn" id="loadEventBtn" onclick="loadFromEvent()">
                        📅 Prochain raid
                    </button>
                    <button class="clear-btn" onclick="clearComposition()">Vider</button>
                </div>
            </div>

            <!-- Event Banner (hidden by default) -->
            <div class="event-banner" id="eventBanner">
                <span class="event-banner-icon">📅</span>
                <div class="event-banner-body">
                    <div class="event-banner-title" id="eventBannerTitle"></div>
                    <div class="event-banner-meta" id="eventBannerMeta"></div>
                    <div class="event-banner-unmatched" id="eventBannerUnmatched"></div>
                </div>
                <button class="event-banner-close" onclick="hideEventBanner()" title="Fermer">✕</button>
            </div>

            <!-- Buff Mini-Bar -->
            <div class="buff-bar" id="buffBar">
                <span class="buff-bar-label">Buffs</span>
                <!-- Populated by updateBuffBar() -->
            </div>

            <!-- Role drop zones -->
            <div class="role-sections">
                <div class="role-section" data-role="tank"
                     ondragover="handleDragOver(event)"
                     ondrop="handleDrop(event, 'tank')"
                     ondragleave="handleDragLeave(event)">
                    <div class="role-header">
                        <span class="role-title tank">Tanks</span>
                        <span class="role-count" id="tankCount">0/2</span>
                    </div>
                    <div class="role-members" id="tankMembers"></div>
                </div>

                <div class="role-section" data-role="healer"
                     ondragover="handleDragOver(event)"
                     ondrop="handleDrop(event, 'healer')"
                     ondragleave="handleDragLeave(event)">
                    <div class="role-header">
                        <span class="role-title healer">Soins</span>
                        <span class="role-count" id="healerCount">0/4</span>
                    </div>
                    <div class="role-members" id="healerMembers"></div>
                </div>

                <div class="role-section" data-role="dps"
                     ondragover="handleDragOver(event)"
                     ondrop="handleDrop(event, 'dps')"
                     ondragleave="handleDragLeave(event)">
                    <div class="role-header">
                        <span class="role-title dps">DPS</span>
                        <span class="role-count" id="dpsCount">0/14</span>
                    </div>
                    <div class="role-members" id="dpsMembers"></div>
                </div>
            </div>
        </div>

        <!-- ── Right Panel – Buffs & Debuffs ── -->
        <div class="analysis-panel" id="analysisPanel">
            <h2 class="panel-title">Buffs &amp; Debuffs</h2>
            <div class="analysis-grid" id="analysisGrid">
                <!-- Populated by updateAnalysis() -->
            </div>
        </div>

    </div>

    <!-- Mobile Tab Bar -->
    <div class="mobile-tab-bar" id="mobileTabBar">
        <button class="tab-btn active" id="tabMembers" onclick="showTab('members')">
            <span class="tab-icon">👥</span>
            <span>Membres</span>
        </button>
        <button class="tab-btn" id="tabComposition" onclick="showTab('composition')">
            <span class="tab-icon">⚔️</span>
            <span>Compo</span>
        </button>
        <button class="tab-btn" id="tabBuffs" onclick="showTab('buffs')">
            <span class="tab-icon">✨</span>
            <span>Buffs</span>
        </button>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // Firebase initialisé via ../scripts/firebase-init.js
        const db = firebase.firestore();

        // ── RaidHelper API ────────────────────────────────────────────────────────
        const EVENTS_API  = 'https://europe-west1-guild-roster-67da7.cloudfunctions.net/getRaidHelperEvents';
        const DETAILS_API = 'https://europe-west1-guild-roster-67da7.cloudfunctions.net/getEventDetails';

        // ── Grade name mapping ────────────────────────────────────────────────────
        const gradeNames = {
            0: 'Grand Sage (GM)',
            1: 'Gardien de Jade (Offs)',
            2: 'Moine du Val (Reroll)',
            3: 'Novice du Lotus (Membre)'
        };

        // ── Spec → role mapping (FR + EN) ────────────────────────────────────────
        const specRoles = {
            // Tanks
            'Blood': 'tank', 'Vengeance': 'tank', 'Guardian': 'tank',
            'Brewmaster': 'tank', 'Protection': 'tank', 'Sang': 'tank',
            'Gardien': 'tank', 'Maître brasseur': 'tank',
            // Healers
            'Restoration': 'healer', 'Holy': 'healer', 'Discipline': 'healer',
            'Mistweaver': 'healer', 'Preservation': 'healer', 'Restauration': 'healer',
            'Sacré': 'healer', 'Tisse-brume': 'healer', 'Préservation': 'healer',
            // Everything else → DPS
        };

        function getMemberRole(member) {
            const spec = member.activeSpec;
            if (spec && specRoles[spec]) return specRoles[spec];
            return 'dps';
        }

        // ── Class CSS color var ───────────────────────────────────────────────────
        const classVars = {
            'Death Knight': '--dk',  'Demon Hunter': '--dh', 'Druid': '--druid',
            'Evoker': '--evoker',    'Hunter': '--hunter',   'Mage': '--mage',
            'Monk': '--monk',        'Paladin': '--paladin', 'Priest': '--priest',
            'Rogue': '--rogue',      'Shaman': '--shaman',   'Warlock': '--warlock',
            'Warrior': '--warrior',
        };

        function classColor(cls) {
            const v = classVars[cls];
            return v ? `var(${v})` : 'var(--text-main)';
        }

        // ── Raid utility (buffs / debuffs) ────────────────────────────────────────
        const raidUtility = {
            'Fureur-du-ciel': {
                providers: ['Shaman'],
                icon: '../img/icons/specs/spell_nature_invisibilitytotem.jpg',
                category: 'Buffs'
            },
            'Marque du chasseur': {
                providers: ['Hunter'],
                icon: '../img/icons/specs/ability_hunter_markedfordeath.jpg',
                category: 'Buffs'
            },
            'Marque du fauve': {
                providers: ['Druid'],
                icon: '../img/icons/specs/spell_nature_regeneration.jpg',
                category: 'Buffs'
            },
            'Bénédiction du bronze': {
                providers: ['Evoker'],
                icon: '../img/icons/specs/ability_evoker_blessingofthebronze.jpg',
                category: 'Buffs'
            },
            'Cri de guerre': {
                providers: ['Warrior'],
                icon: '../img/icons/specs/ability_warrior_battleshout.jpg',
                category: 'Buffs'
            },
            'Intelligence des Arcanes': {
                providers: ['Mage'],
                icon: '../img/icons/specs/spell_holy_magicalsentry.jpg',
                category: 'Buffs'
            },
            'Mot de pouvoir : Robustesse': {
                providers: ['Priest'],
                icon: '../img/icons/specs/spell_holy_wordfortitude.jpg',
                category: 'Buffs'
            },
            'Marque du chaos': {
                providers: ['Demon Hunter'],
                icon: '../img/icons/specs/ability_demonhunter_empowerwards.jpg',
                category: 'Debuffs'
            },
            'Toucher mystique': {
                providers: ['Monk'],
                icon: '../img/icons/specs/ability_monk_sparring.jpg',
                category: 'Debuffs'
            }
        };

        // ── XSS guard ─────────────────────────────────────────────────────────────
        function escHtml(s) {
            return String(s ?? '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // ── Toast ─────────────────────────────────────────────────────────────────
        function showToast(msg, type = 'info', duration = 4000) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.transition = 'opacity 0.3s';
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 350);
            }, duration);
        }

        // ── State ─────────────────────────────────────────────────────────────────
        let allMembers         = [];
        let raidComposition    = { tank: [], healer: [], dps: [] };
        let activeGradeFilter  = 'all';
        let activeRoleFilter   = 'all';
        let knownGrades        = new Set();
        let draggedMember      = null;

        // ── Mobile Tab Navigation ─────────────────────────────────────────────────
        let activeTab = 'members';

        function showTab(tab) {
            activeTab = tab;
            const panels = {
                members:     document.getElementById('membersPanel'),
                composition: document.getElementById('compositionPanel'),
                buffs:       document.getElementById('analysisPanel'),
            };
            const tabs = {
                members:     document.getElementById('tabMembers'),
                composition: document.getElementById('tabComposition'),
                buffs:       document.getElementById('tabBuffs'),
            };
            Object.entries(panels).forEach(([key, el]) => {
                el.classList.toggle('panel-visible', key === tab);
            });
            Object.entries(tabs).forEach(([key, el]) => {
                el.classList.toggle('active', key === tab);
            });
        }

        function isMobile() { return window.innerWidth <= 768; }

        function initLayout() {
            if (isMobile()) {
                showTab('members');
                document.getElementById('membersPanelSubtitle').textContent = 'Appuyez sur un membre pour l\'ajouter';
            } else {
                // Desktop: all panels visible (no panel-visible class needed — CSS shows all)
                ['membersPanel', 'compositionPanel', 'analysisPanel'].forEach(id => {
                    document.getElementById(id).classList.remove('panel-visible');
                });
            }
        }

        window.addEventListener('resize', () => {
            if (!isMobile()) {
                // Restore desktop layout
                ['membersPanel', 'compositionPanel', 'analysisPanel'].forEach(id => {
                    document.getElementById(id).classList.remove('panel-visible');
                });
                document.getElementById('membersPanelSubtitle').textContent = 'Glissez les membres vers la composition';
            } else {
                showTab(activeTab);
                document.getElementById('membersPanelSubtitle').textContent = 'Appuyez sur un membre pour l\'ajouter';
            }
        });

        // ── Tap-to-add (mobile) ───────────────────────────────────────────────────
        function tapAddMember(member) {
            const all = [...raidComposition.tank, ...raidComposition.healer, ...raidComposition.dps];
            if (all.find(m => m.id === member.id)) return;
            const role = getMemberRole(member);
            raidComposition[role].push(member);
            refresh();
            if (isMobile()) showTab('composition');
        }

        // ── Firestore: load members ───────────────────────────────────────────────
        async function loadMembers() {
            const memberList = document.getElementById('memberList');
            try {
                const snapshot = await db.collection('guild-members')
                    .where('active', '==', true)
                    .get();

                allMembers = [];
                knownGrades.clear();

                snapshot.forEach(doc => {
                    const member = { id: doc.id, ...doc.data() };
                    allMembers.push(member);
                    knownGrades.add(member.rank);
                });

                allMembers.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
                createGradeFilters();
                renderMembers();
            } catch (err) {
                console.error('Error loading members:', err);
                memberList.innerHTML = '<p style="color: var(--text-muted); padding: 1rem;">Erreur de chargement</p>';
            }
        }

        // ── Grade filter buttons ──────────────────────────────────────────────────
        function createGradeFilters() {
            const container = document.getElementById('gradeFilters');
            container.innerHTML = '<button class="filter-btn active" data-grade="all" onclick="filterByGrade(\'all\')">Tous rangs</button>';
            [...knownGrades].sort((a, b) => a - b).forEach(grade => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.dataset.grade = grade;
                btn.textContent = gradeNames[grade] || `Rang ${grade}`;
                btn.onclick = () => filterByGrade(grade);
                container.appendChild(btn);
            });
        }

        function filterByGrade(grade) {
            activeGradeFilter = grade;
            document.querySelectorAll('#gradeFilters .filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.grade == grade);
            });
            renderMembers();
        }

        function filterByRole(role) {
            activeRoleFilter = role;
            document.querySelectorAll('#roleFilters .filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.role == role);
            });
            renderMembers();
        }

        // ── Render member list ────────────────────────────────────────────────────
        function renderMembers() {
            const memberList = document.getElementById('memberList');
            memberList.innerHTML = '';

            const raidIds = new Set([
                ...raidComposition.tank.map(m => m.id),
                ...raidComposition.healer.map(m => m.id),
                ...raidComposition.dps.map(m => m.id),
            ]);

            const filtered = allMembers.filter(m => {
                const gradeOk = activeGradeFilter === 'all' || m.rank == activeGradeFilter;
                const roleOk  = activeRoleFilter  === 'all' || getMemberRole(m) === activeRoleFilter;
                return gradeOk && roleOk;
            });

            filtered.forEach(member => {
                const card = document.createElement('div');
                card.className = 'member-card' + (raidIds.has(member.id) ? ' in-raid' : '');
                card.draggable = true;
                card.dataset.memberId = member.id;

                card.ondragstart = (e) => handleDragStart(e, member);
                card.ondragend   = handleDragEnd;
                card.onclick     = () => tapAddMember(member);

                const icon = classIcons[member.class] || classIcons['Warrior'];
                const spec = escHtml(member.activeSpec || '');
                const ilvl = member.ilvl ? `ilvl ${member.ilvl}` : '';
                const color = classColor(member.class);

                card.innerHTML = `
                    <img src="${escHtml(icon)}" alt="${escHtml(member.class)}" class="member-class-icon" loading="lazy">
                    <div class="member-info">
                        <div class="member-name" style="color:${color}">${escHtml(member.name)}</div>
                        <div class="member-details">${spec}</div>
                    </div>
                    <span class="member-ilvl">${escHtml(ilvl)}</span>
                `;

                memberList.appendChild(card);
            });

            if (filtered.length === 0) {
                memberList.innerHTML = '<p style="color: var(--text-muted); padding: 1rem; text-align: center;">Aucun membre trouvé</p>';
            }
        }

        // ── Drag and Drop ─────────────────────────────────────────────────────────
        function handleDragStart(e, member) {
            draggedMember = member;
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.role-section').forEach(s => s.classList.remove('drag-over'));
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.currentTarget.classList.add('drag-over');
        }

        function handleDragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
        }

        function handleDrop(e, role) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            if (!draggedMember) return;
            const all = [...raidComposition.tank, ...raidComposition.healer, ...raidComposition.dps];
            if (all.find(m => m.id === draggedMember.id)) { draggedMember = null; return; }
            raidComposition[role].push(draggedMember);
            draggedMember = null;
            refresh();
        }

        // ── Composition management ────────────────────────────────────────────────
        function removeFromRaid(memberId, role) {
            raidComposition[role] = raidComposition[role].filter(m => m.id !== memberId);
            refresh();
        }

        function clearComposition() {
            raidComposition = { tank: [], healer: [], dps: [] };
            hideEventBanner();
            refresh();
        }

        // ── Master refresh ────────────────────────────────────────────────────────
        function refresh() {
            updateRaidDisplay();
            renderMembers();
            updateAnalysis();
            updateBuffBar();
        }

        // ── Update raid display ───────────────────────────────────────────────────
        function updateRaidDisplay() {
            const total = raidComposition.tank.length + raidComposition.healer.length + raidComposition.dps.length;
            document.getElementById('raidCount').textContent = total;
            document.getElementById('tankCount').textContent   = `${raidComposition.tank.length}/2`;
            document.getElementById('healerCount').textContent = `${raidComposition.healer.length}/4`;
            document.getElementById('dpsCount').textContent    = `${raidComposition.dps.length}/14`;

            ['tank', 'healer', 'dps'].forEach(role => {
                const container = document.getElementById(`${role}Members`);
                container.innerHTML = '';
                raidComposition[role].forEach(member => {
                    const icon  = classIcons[member.class] || classIcons['Warrior'];
                    const color = classColor(member.class);
                    const div   = document.createElement('div');
                    div.className = 'raid-member';
                    div.innerHTML = `
                        <img src="${escHtml(icon)}" alt="${escHtml(member.class)}" class="member-class-icon" loading="lazy">
                        <span class="member-name" style="color:${color}">${escHtml(member.name)}</span>
                        <button class="remove-member" onclick="removeFromRaid('${escHtml(member.id)}', '${role}')" title="Retirer">&times;</button>
                    `;
                    container.appendChild(div);
                });
            });
        }

        // ── Buff mini-bar (composition panel) ────────────────────────────────────
        function updateBuffBar() {
            const bar = document.getElementById('buffBar');
            const classesInRaid = new Set(
                [...raidComposition.tank, ...raidComposition.healer, ...raidComposition.dps].map(m => m.class)
            );

            let html = '<span class="buff-bar-label">Buffs</span>';
            for (const [name, data] of Object.entries(raidUtility)) {
                const has = data.providers.some(p => classesInRaid.has(p));
                html += `<div class="buff-dot ${has ? 'available' : 'missing'}" data-tooltip="${escHtml(name)}">
                    <img src="${escHtml(data.icon)}" alt="${escHtml(name)}" loading="lazy">
                </div>`;
            }
            bar.innerHTML = html;
        }

        // ── Analysis panel (right) ────────────────────────────────────────────────
        function updateAnalysis() {
            const grid = document.getElementById('analysisGrid');
            const classesInRaid = new Set(
                [...raidComposition.tank, ...raidComposition.healer, ...raidComposition.dps].map(m => m.class)
            );

            const categories = {};
            for (const [name, data] of Object.entries(raidUtility)) {
                if (!categories[data.category]) categories[data.category] = [];
                categories[data.category].push(name);
            }

            let html = '';
            for (const category of ['Buffs', 'Debuffs']) {
                const utilities = categories[category];
                if (!utilities) continue;

                html += `<div class="buff-category">
                    <div class="buff-category-title">${escHtml(category)}</div>
                    <div class="buff-list">`;

                utilities.forEach(name => {
                    const data     = raidUtility[name];
                    const has      = data.providers.some(p => classesInRaid.has(p));
                    const provider = has ? data.providers.find(p => classesInRaid.has(p)) : data.providers[0];

                    html += `<div class="buff-item ${has ? 'available' : 'missing'}">
                        <img src="${escHtml(data.icon)}" alt="${escHtml(name)}" class="buff-icon" loading="lazy">
                        <span class="buff-name">${escHtml(name)}</span>
                        <span class="buff-provider">${escHtml(provider)}</span>
                    </div>`;
                });

                html += `</div></div>`;
            }

            grid.innerHTML = html;
        }

        // ── Event Integration ─────────────────────────────────────────────────────
        const ROLE_MAP = { 'Tanks': 'tank', 'Healers': 'healer', 'Melee': 'dps', 'Ranged': 'dps' };

        async function loadFromEvent() {
            const btn = document.getElementById('loadEventBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Chargement…';

            try {
                // 1. Fetch event list
                const evRes = await fetch(EVENTS_API);
                if (!evRes.ok) throw new Error(`Events API: ${evRes.status}`);
                const { events } = await evRes.json();

                if (!events || events.length === 0) {
                    showToast('Aucun événement trouvé dans RaidHelper.', 'error');
                    return;
                }

                // 2. Find the next upcoming event (sort by startTime, prefer future)
                const now = Date.now();
                const sorted = [...events].sort((a, b) => a.startTime - b.startTime);
                const next = sorted.find(e => e.startTime * 1000 >= now) || sorted[0];

                // 3. Fetch event details (sign-ups)
                const detRes = await fetch(`${DETAILS_API}?eventId=${encodeURIComponent(next.id)}`);
                if (!detRes.ok) throw new Error(`Details API: ${detRes.status}`);
                const detail = await detRes.json();

                const signUps = detail.signUps || [];
                if (signUps.length === 0) {
                    showToast('Aucune inscription pour cet événement.', 'info');
                    showEventBanner(next, 0, 0, []);
                    return;
                }

                // 4. Build lookup: lowercase name → member
                const memberMap = new Map(allMembers.map(m => [m.name.toLowerCase(), m]));

                // 5. Clear composition and populate from sign-ups
                raidComposition = { tank: [], healer: [], dps: [] };
                const matched   = [];
                const unmatched = [];

                signUps.forEach(su => {
                    const role = ROLE_MAP[su.role];
                    if (!role) return; // skip absences/bench rows if they appear
                    const member = memberMap.get((su.name || '').toLowerCase());
                    if (member) {
                        // Avoid duplicates
                        const all = [...raidComposition.tank, ...raidComposition.healer, ...raidComposition.dps];
                        if (!all.find(m => m.id === member.id)) {
                            raidComposition[role].push(member);
                            matched.push(member.name);
                        }
                    } else {
                        unmatched.push(su.name || '?');
                    }
                });

                refresh();
                showEventBanner(next, matched.length, signUps.length, unmatched);

                const msg = `${matched.length} joueur${matched.length !== 1 ? 's' : ''} chargé${matched.length !== 1 ? 's' : ''} depuis RaidHelper.`;
                showToast(msg, matched.length > 0 ? 'success' : 'info');

                if (isMobile()) showTab('composition');

            } catch (err) {
                console.error('loadFromEvent:', err);
                showToast('Impossible de charger l\'événement. Vérifiez la console.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '📅 Prochain raid';
            }
        }

        function showEventBanner(event, matched, total, unmatched) {
            const banner   = document.getElementById('eventBanner');
            const title    = document.getElementById('eventBannerTitle');
            const meta     = document.getElementById('eventBannerMeta');
            const unmEl    = document.getElementById('eventBannerUnmatched');

            const date = event.startTime
                ? new Date(event.startTime * 1000).toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' })
                : '';

            title.textContent = event.title || 'Raid';
            meta.textContent  = `${date} · ${matched} / ${total} joueurs reconnus`;

            if (unmatched.length > 0) {
                unmEl.textContent = `Non trouvés : ${unmatched.slice(0, 8).map(n => n).join(', ')}${unmatched.length > 8 ? ` +${unmatched.length - 8}` : ''}`;
                unmEl.style.display = '';
            } else {
                unmEl.style.display = 'none';
            }

            banner.classList.add('visible');
        }

        function hideEventBanner() {
            document.getElementById('eventBanner').classList.remove('visible');
        }

        // ── Init ──────────────────────────────────────────────────────────────────
        async function init() {
            initLayout();
            await loadMembers();
            updateAnalysis();
            updateBuffBar();
        }

        init();
    </script>

</body>
</html>
