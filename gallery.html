<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie — Les Sages de Pandarie</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <meta name="description" content="Les créations et compositions humoristiques des membres des Sages de Pandarie.">
    <meta property="og:title" content="Galerie des Membres — Les Sages de Pandarie">
    <meta property="og:image" content="https://www.sagesdepandarie.ovh/img/logo.png">
    <meta property="og:url" content="https://www.sagesdepandarie.ovh/gallery.html">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="styles/common.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="scripts/firebase-init.js"></script>
    <script src="scripts/admin-auth.js"></script>
    <!-- Discord auth (pour l'upload membres) -->
    <script src="/roster/discordAuth.js"></script>

    <style>
        body { padding-top: 80px; }

        /* ── Page header ── */
        .share-btn {
            display: none;
            align-items: center;
            gap: 0.5rem;
            padding: 0.55rem 1.1rem;
            background: rgba(88,101,242,0.1);
            border: 1px solid rgba(88,101,242,0.45);
            border-radius: 8px;
            color: #7289da;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }
        .share-btn:hover { background: rgba(88,101,242,0.2); border-color: #7289da; }
        .share-btn.visible { display: inline-flex; }

        .discord-hint-btn {
            display: none;
            align-items: center;
            gap: 0.5rem;
            padding: 0.55rem 1.1rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-muted);
            font-size: 0.85rem;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }
        .discord-hint-btn:hover { border-color: #7289da; color: #7289da; }
        .discord-hint-btn.visible { display: inline-flex; }

        /* ── Admin notice ── */
        .admin-notice {
            display: none;
            background: rgba(212,175,55,0.07);
            border: 1px solid rgba(212,175,55,0.28);
            border-radius: 8px;
            padding: 0.6rem 1rem;
            font-size: 0.85rem;
            color: var(--primary);
            margin-bottom: 1.5rem;
        }
        .admin-notice.visible { display: block; }

        /* ── Gallery grid ── */
        .gallery-section { padding: 3rem 0 5rem; min-height: 60vh; }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
        }

        /* ── Gallery card ── */
        .gallery-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.25s, border-color 0.25s;
            position: relative;
        }
        .gallery-card:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.2); }

        .gallery-img {
            height: 220px;
            background-size: cover;
            background-position: center;
            background-color: var(--bg-surface);
            position: relative;
        }

        /* Admin delete button */
        .gallery-delete {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: rgba(13,17,23,0.85);
            border: 1px solid rgba(255,107,107,0.4);
            border-radius: 6px;
            color: #ff6b6b;
            font-size: 1rem;
            line-height: 1;
            padding: 0.3rem 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            display: none;
        }
        .admin-mode .gallery-delete { display: block; }
        .gallery-delete:hover { background: rgba(255,107,107,0.15); border-color: #ff6b6b; }

        /* Card footer */
        .gallery-footer {
            padding: 0.85rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .gallery-footer-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .gallery-author {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .author-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .author-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .gallery-date {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .gallery-caption {
            font-size: 0.82rem;
            color: var(--text-muted);
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── Empty state ── */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5rem 2rem;
            color: var(--text-muted);
        }
        .empty-state p:first-child { font-size: 2.5rem; margin-bottom: 0.75rem; }

        /* ── Upload Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-overlay.visible { display: flex; }

        .modal-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            width: 100%;
            max-width: 520px;
            max-height: 92vh;
            overflow-y: auto;
            box-shadow: 0 24px 60px rgba(0,0,0,0.6);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 1.5rem 1rem;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--bg-card);
            z-index: 1;
            border-radius: 14px 14px 0 0;
        }
        .modal-header h3 { font-size: 1.15rem; color: var(--primary); margin: 0; }
        .modal-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.1rem; padding: 0.25rem; transition: color 0.2s; }
        .modal-close:hover { color: #ff6b6b; }

        .modal-form { padding: 1.5rem; display: flex; flex-direction: column; gap: 1.1rem; }

        /* Upload zone */
        .upload-zone {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1.25rem 1rem;
            border: 2px dashed var(--border);
            border-radius: 8px;
            transition: border-color 0.2s, background 0.2s;
            cursor: pointer;
        }
        .upload-zone:hover, .upload-zone.drag-over {
            border-color: #7289da;
            background: rgba(88,101,242,0.05);
        }
        .upload-zone-btn {
            padding: 0.45rem 0.9rem;
            background: rgba(88,101,242,0.1);
            border: 1px solid rgba(88,101,242,0.4);
            border-radius: 6px;
            color: #7289da;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .upload-zone-btn:hover { background: rgba(88,101,242,0.2); }
        .upload-zone-hint { font-size: 0.8rem; color: var(--text-muted); }

        /* Progress */
        .upload-progress-wrap { display: none; flex-direction: column; gap: 0.3rem; }
        .upload-progress-wrap.visible { display: flex; }
        .upload-progress-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
        .upload-progress-fill { height: 100%; background: #7289da; border-radius: 3px; width: 0%; transition: width 0.15s; }
        .upload-progress-label { font-size: 0.75rem; color: var(--text-muted); }

        /* Image preview */
        .image-preview { border-radius: 8px; overflow: hidden; height: 0; transition: height 0.25s; }
        .image-preview.has-image { height: 140px; }
        .image-preview img { width: 100%; height: 140px; object-fit: cover; display: block; }

        /* Form */
        .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
        .form-group label { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; }
        .form-hint { font-weight: 400; text-transform: none; letter-spacing: 0; font-size: 0.72rem; opacity: 0.7; }
        .form-group input {
            background: #2a2f38;
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 0.65rem 0.85rem;
            color: var(--text-main, #e6edf3);
            font-family: inherit;
            font-size: 0.9rem;
            transition: border-color 0.2s;
            box-sizing: border-box;
            width: 100%;
        }
        .form-group input:focus { outline: none; border-color: #7289da; }
        .form-group input::placeholder { color: var(--text-muted); opacity: 0.6; }

        /* Modal footer */
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            padding: 1.25rem 1.5rem;
            border-top: 1px solid var(--border);
            position: sticky;
            bottom: 0;
            background: var(--bg-card);
            border-radius: 0 0 14px 14px;
        }
        .btn-cancel { padding: 0.6rem 1.2rem; background: transparent; border: 1px solid var(--border); border-radius: 7px; color: var(--text-muted); cursor: pointer; font-family: inherit; font-size: 0.9rem; transition: all 0.2s; }
        .btn-cancel:hover { border-color: var(--text-secondary); color: var(--text-secondary); }
        .btn-save { padding: 0.6rem 1.5rem; background: rgba(88,101,242,0.12); border: 1px solid #7289da; border-radius: 7px; color: #7289da; cursor: pointer; font-family: inherit; font-size: 0.9rem; font-weight: 700; transition: all 0.2s; }
        .btn-save:hover { background: rgba(88,101,242,0.22); }
        .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── Lightbox ── */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            flex-direction: column;
            gap: 1rem;
        }
        .lightbox.visible { display: flex; }

        .lightbox img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 8px;
            object-fit: contain;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
        }

        .lightbox-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: #fff;
            font-size: 0.9rem;
        }

        .lightbox-close {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 1.1rem;
            padding: 0.5rem 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
            z-index: 2001;
        }
        .lightbox-close:hover { background: rgba(255,107,107,0.3); }

        /* ── Toast ── */
        .toast-container { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; align-items: center; pointer-events: none; }
        .toast { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.65rem 1.2rem; font-size: 0.85rem; white-space: nowrap; animation: toast-in 0.25s ease; }
        @keyframes toast-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .toast.success { border-color: #4caf50; color: #4caf50; }
        .toast.error   { border-color: #ff6b6b; color: #ff6b6b; }
        .toast.info    { border-color: rgba(212,175,55,0.5); color: var(--primary); }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
        }
        @media (max-width: 500px) {
            .gallery-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav class="navbar"></nav>
    <script src="scripts/navbar.js"></script>

    <div class="page-header">
        <div class="container">
            <div class="page-header-row">
                <div>
                    <h1>Galerie des Membres</h1>
                    <p>Les créations de la guilde</p>
                </div>
                <div style="display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap;">
                    <button id="shareBtn"       class="share-btn"       onclick="openUploadModal()">📸 Partager une création</button>
                    <button id="discordHintBtn" class="discord-hint-btn" onclick="discordLogin()">Se connecter pour partager</button>
                    <button id="adminBtn"       class="admin-btn"        onclick="toggleAdmin()">Admin</button>
                </div>
            </div>
        </div>
    </div>

    <section class="gallery-section">
        <div class="container">
            <div id="adminNotice" class="admin-notice">
                Mode admin actif — cliquez sur × pour supprimer une image.
            </div>
            <div class="gallery-grid" id="galleryGrid">
                <div class="loader"></div>
            </div>
        </div>
    </section>

    <!-- ── Upload Modal ── -->
    <div class="modal-overlay" id="uploadOverlay" onclick="handleOverlayClick(event)">
        <div class="modal-box">
            <div class="modal-header">
                <h3>Partager une création</h3>
                <button class="modal-close" onclick="closeUploadModal()">✕</button>
            </div>
            <form class="modal-form" id="uploadForm" onsubmit="submitUpload(event)">
                <input type="file" id="fGalleryFile" accept="image/*" style="display:none" onchange="handleFileSelect(this.files[0])">
                <div class="upload-zone" id="galleryUploadZone"
                     onclick="document.getElementById('fGalleryFile').click()"
                     ondragover="event.preventDefault(); this.classList.add('drag-over')"
                     ondragleave="this.classList.remove('drag-over')"
                     ondrop="this.classList.remove('drag-over'); handleFileSelect(event.dataTransfer.files[0]); event.preventDefault()">
                    <button type="button" class="upload-zone-btn" onclick="event.stopPropagation(); document.getElementById('fGalleryFile').click()">
                        📎 Choisir une image
                    </button>
                    <span class="upload-zone-hint">ou glisser-déposer ici</span>
                </div>

                <div class="upload-progress-wrap" id="galleryUploadProgress">
                    <div class="upload-progress-track">
                        <div class="upload-progress-fill" id="galleryProgressFill"></div>
                    </div>
                    <span class="upload-progress-label" id="galleryProgressLabel">Upload en cours…</span>
                </div>

                <div class="image-preview" id="galleryPreview"></div>

                <div class="form-group">
                    <label>Titre <span class="form-hint">optionnel</span></label>
                    <input type="text" id="fCaption" placeholder="Une légende pour ta création…" maxlength="120">
                </div>
            </form>
            <div class="modal-footer">
                <button type="button" class="btn-cancel" onclick="closeUploadModal()">Annuler</button>
                <button type="submit" form="uploadForm" class="btn-save" id="btnGallerySave" disabled>Publier</button>
            </div>
        </div>
    </div>

    <!-- ── Lightbox ── -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <button class="lightbox-close" onclick="closeLightbox()">✕</button>
        <img id="lightboxImg" src="" alt="">
        <div class="lightbox-meta" onclick="event.stopPropagation()">
            <div class="gallery-author" id="lightboxAuthor"></div>
            <span id="lightboxCaption" style="color:rgba(255,255,255,0.7);font-style:italic"></span>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        const db = firebase.firestore();

        // ── Cloudinary ────────────────────────────────────────────────────────
        const CLOUD  = 'dcgb4bhvh';
        const PRESET = 'guild_gallery';

        // ── Helpers ───────────────────────────────────────────────────────────
        function escHtml(s) {
            return String(s ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function showToast(msg, type = 'info', ms = 4000) {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => { t.style.transition = 'opacity 0.3s'; t.style.opacity = '0'; setTimeout(() => t.remove(), 350); }, ms);
        }

        function formatDateShort(ts) {
            const d = ts?.toDate ? ts.toDate() : new Date(ts);
            return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        // Avatar color from userId string
        function avatarColor(id) {
            let h = 0;
            for (let i = 0; i < (id || '').length; i++) h = (h * 31 + id.charCodeAt(i)) & 0xffffff;
            return `hsl(${h % 360}, 60%, 50%)`;
        }

        // ── State ─────────────────────────────────────────────────────────────
        let isAdmin       = false;
        let pendingImgUrl = null; // URL Cloudinary en attente de soumission

        // ── Auth ──────────────────────────────────────────────────────────────
        function toggleAdmin() { AdminAuth.toggle(); }

        AdminAuth.init({
            onAdmin: () => {
                isAdmin = true;
                document.getElementById('adminBtn').textContent = 'Quitter admin';
                document.getElementById('adminBtn').classList.add('active');
                document.getElementById('adminNotice').classList.add('visible');
                document.body.classList.add('admin-mode');
                rerender();
            },
            onSignedOut: () => {
                isAdmin = false;
                document.getElementById('adminBtn').textContent = 'Admin';
                document.getElementById('adminBtn').classList.remove('active');
                document.getElementById('adminNotice').classList.remove('visible');
                document.body.classList.remove('admin-mode');
                rerender();
            }
        });

        function initDiscordUI() {
            const hasDiscord = DiscordAuth.isAuthenticated();
            document.getElementById('shareBtn').classList.toggle('visible', hasDiscord);
            document.getElementById('discordHintBtn').classList.toggle('visible', !hasDiscord);
        }

        function discordLogin() {
            sessionStorage.setItem('discord_return_url', '/gallery.html');
            DiscordAuth.login();
        }

        // ── Firestore subscription ────────────────────────────────────────────
        let galleryEntries = [];

        function subscribeGallery() {
            db.collection('gallery').orderBy('uploadedAt', 'desc').onSnapshot(
                snap => {
                    galleryEntries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    rerender();
                },
                err => console.error('Gallery snapshot:', err)
            );
        }

        // ── Render ────────────────────────────────────────────────────────────
        function rerender() {
            const grid = document.getElementById('galleryGrid');

            if (galleryEntries.length === 0) {
                grid.innerHTML = `<div class="empty-state">
                    <p>🎨</p>
                    <p>Aucune création partagée pour l'instant.</p>
                    <p style="font-size:0.85rem;margin-top:0.5rem">Sois le premier !</p>
                </div>`;
                return;
            }

            grid.innerHTML = galleryEntries.map(entry => {
                const color    = avatarColor(entry.authorId || entry.authorName || '');
                const initial  = (entry.authorName || '?')[0].toUpperCase();
                const caption  = entry.title ? `<p class="gallery-caption">${escHtml(entry.title)}</p>` : '';
                const deleteBtn = `<button class="gallery-delete" onclick="event.stopPropagation();confirmDelete('${escHtml(entry.id)}')" title="Supprimer">×</button>`;

                return `<div class="gallery-card" onclick="openLightbox('${escHtml(entry.id)}')">
                    <div class="gallery-img" style="background-image:url('${escHtml(entry.imageUrl)}')">
                        ${deleteBtn}
                    </div>
                    <div class="gallery-footer">
                        <div class="gallery-footer-top">
                            <div class="gallery-author">
                                <span class="author-avatar" style="background:${color}">${escHtml(initial)}</span>
                                <span class="author-name">${escHtml(entry.authorName || 'Membre')}</span>
                            </div>
                            <span class="gallery-date">${formatDateShort(entry.uploadedAt)}</span>
                        </div>
                        ${caption}
                    </div>
                </div>`;
            }).join('');
        }

        // ── Lightbox ──────────────────────────────────────────────────────────
        function openLightbox(id) {
            const entry = galleryEntries.find(e => e.id === id);
            if (!entry) return;

            const color   = avatarColor(entry.authorId || entry.authorName || '');
            const initial = (entry.authorName || '?')[0].toUpperCase();

            document.getElementById('lightboxImg').src = entry.imageUrl;
            document.getElementById('lightboxAuthor').innerHTML = `
                <span class="author-avatar" style="background:${color};width:28px;height:28px;font-size:0.8rem">${escHtml(initial)}</span>
                <span class="author-name" style="color:#fff">${escHtml(entry.authorName || 'Membre')}</span>`;
            document.getElementById('lightboxCaption').textContent = entry.title || '';
            document.getElementById('lightbox').classList.add('visible');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('visible');
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') { closeLightbox(); closeUploadModal(); }
        });

        // ── Upload modal ──────────────────────────────────────────────────────
        function openUploadModal() {
            if (!DiscordAuth.isAuthenticated()) { discordLogin(); return; }
            pendingImgUrl = null;
            document.getElementById('uploadForm').reset();
            document.getElementById('galleryPreview').className = 'image-preview';
            document.getElementById('galleryPreview').innerHTML = '';
            document.getElementById('galleryUploadProgress').classList.remove('visible');
            document.getElementById('btnGallerySave').disabled = true;
            document.getElementById('uploadOverlay').classList.add('visible');
        }

        function closeUploadModal() {
            document.getElementById('uploadOverlay').classList.remove('visible');
            pendingImgUrl = null;
            document.getElementById('fGalleryFile').value = '';
        }

        function handleOverlayClick(e) {
            if (e.target === document.getElementById('uploadOverlay')) closeUploadModal();
        }

        // ── Cloudinary upload ─────────────────────────────────────────────────
        async function handleFileSelect(file) {
            if (!file || !file.type.startsWith('image/')) {
                showToast('Sélectionne un fichier image.', 'error');
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                showToast('Image trop lourde — 10 Mo maximum.', 'error');
                return;
            }

            const progress = document.getElementById('galleryUploadProgress');
            const fill     = document.getElementById('galleryProgressFill');
            const label    = document.getElementById('galleryProgressLabel');
            const save     = document.getElementById('btnGallerySave');

            progress.classList.add('visible');
            save.disabled = true;
            fill.style.width = '0%';
            label.textContent = 'Upload en cours…';

            // Preview immédiat (avant upload pour feedback rapide)
            const reader = new FileReader();
            reader.onload = ev => {
                const preview = document.getElementById('galleryPreview');
                preview.classList.add('has-image');
                preview.innerHTML = `<img src="${ev.target.result}" alt="Aperçu">`;
            };
            reader.readAsDataURL(file);

            const formData = new FormData();
            formData.append('file',          file);
            formData.append('upload_preset', PRESET);

            try {
                await new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD}/image/upload`);
                    xhr.upload.onprogress = e => {
                        if (e.lengthComputable) {
                            const pct = Math.round(e.loaded / e.total * 100);
                            fill.style.width  = pct + '%';
                            label.textContent = `Upload… ${pct}%`;
                        }
                    };
                    xhr.onload = () => {
                        if (xhr.status === 200) {
                            const res = JSON.parse(xhr.responseText);
                            pendingImgUrl = res.secure_url;
                            label.textContent = 'Image prête ✓';
                            fill.style.width = '100%';
                            save.disabled = false;
                            resolve();
                        } else { reject(new Error(`HTTP ${xhr.status}`)); }
                    };
                    xhr.onerror = () => reject(new Error('Réseau'));
                    xhr.send(formData);
                });
            } catch (err) {
                console.error('Cloudinary:', err);
                showToast('Erreur upload — réessaie.', 'error');
                progress.classList.remove('visible');
                pendingImgUrl = null;
            } finally {
                document.getElementById('fGalleryFile').value = '';
            }
        }

        // ── Submit entry ──────────────────────────────────────────────────────
        async function submitUpload(e) {
            e.preventDefault();
            if (!pendingImgUrl) { showToast('Choisis d\'abord une image.', 'error'); return; }

            const user    = DiscordAuth.getUserInfo();
            const caption = document.getElementById('fCaption').value.trim();
            const save    = document.getElementById('btnGallerySave');
            save.disabled = true;

            try {
                await db.collection('gallery').add({
                    imageUrl:   pendingImgUrl,
                    authorName: user?.username || 'Membre',
                    authorId:   user?.userId   || '',
                    title:      caption || null,
                    uploadedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                showToast('Création publiée ! 🎉', 'success');
                closeUploadModal();
            } catch (err) {
                console.error('Firestore save:', err);
                showToast('Erreur lors de la publication.', 'error');
                save.disabled = false;
            }
        }

        // ── Admin delete ──────────────────────────────────────────────────────
        async function confirmDelete(id) {
            if (!confirm('Supprimer cette image définitivement ?')) return;
            try {
                await db.collection('gallery').doc(id).delete();
                showToast('Image supprimée.', 'success');
            } catch (err) {
                console.error('Delete:', err);
                showToast('Erreur lors de la suppression.', 'error');
            }
        }

        // ── Init ──────────────────────────────────────────────────────────────
        initDiscordUI();
        subscribeGallery();
    </script>

</body>
</html>
